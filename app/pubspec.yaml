name: vexfy
description: "Vexfy - 个人音乐播放器，流畅、稳定、低内存"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5
dart-native-assets: false
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 状态管理 + 路由
  get: ^4.6.6

  # 本地数据库
  sqflite: ^2.3.3
  path_provider: ^2.1.3

  # 音频播放
  just_audio: ^0.9.40
  audio_service: ^0.18.15
  on_audio_query_pluse: ^3.0.6
  # 为 Linux 和 Windows 提供 just_audio 支持
  just_audio_media_kit: ^2.1.0
  media_kit_libs_linux: any

  # 工具
  uuid: ^4.4.2
  crypto: ^3.0.3
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.4.0+3

flutter:
  uses-material-design: true