name: vexfy
description: "Vexfy - 个人音乐播放器，流畅、稳定、低内存"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 状态管理 + 路由
  get: ^4.6.6

  # 本地数据库
  sqflite: ^2.3.3
  path_provider: ^2.1.3

  # 音频播放
  just_audio: ^0.9.40
  audio_service: ^0.18.15
  on_audio_query: ^2.9.0

  # 工具
  uuid: ^4.4.2
  crypto: ^3.0.3
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true